<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 클래식 Windows 9x 테마 변수 */
    :root {
      --win-bg: #c0c0c0;
      --win-border-light: #ffffff;
      --win-border-dark: #808080;
      --win-border-darker: #404040;
      --win-title-bg: #000080;
      --win-title-text: #ffffff;
    }

    body {
      font-family: 'Silkscreen', 'Gulim', 'Microsoft Sans Serif', sans-serif;
      background-color: #008080;
      color: #000;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* 텍스트용 픽셀 폰트 (숫자, 영문 등) */
    .pixel-font {
      font-family: 'VT323', monospace;
      letter-spacing: 1px;
    }

    /* 메인 윈도우 프레임 - 뷰포트 전체 채움 */
    .window {
      background-color: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-darker);
      border-bottom: 2px solid var(--win-border-darker);
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    /* 음각 테두리 (패널 내부 용) */
    .inset-border {
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-right: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-light);
    }

    /* 타이틀 바 */
    .title-bar {
      background-color: var(--win-title-bg);
      color: var(--win-title-text);
      padding: 3px 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .title-bar-controls {
      display: flex;
      gap: 2px;
    }

    .title-btn {
      width: 16px;
      height: 14px;
      background: var(--win-bg);
      border-top: 1px solid var(--win-border-light);
      border-left: 1px solid var(--win-border-light);
      border-right: 1px solid var(--win-border-dark);
      border-bottom: 1px solid var(--win-border-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
      color: #000;
      cursor: default;
      font-weight: bold;
    }

    /* 윈도우 내부 컨텐츠 */
    .window-content {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid var(--win-border-light);
      border-left: 1px solid var(--win-border-light);
    }

    /* 최상단 헤더 표시 바 영역 (대시보드 접속상태 등) */
    .app-header {
      display: flex;
      justify-content: space-between;
      height: 30px;
      gap: 10px;
    }

    .header-panel {
      background: var(--win-bg);
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 14px;
    }

    /* 중앙 2단 레이아웃 */
    .main-body {
      display: flex;
      flex: 1;
      gap: 10px;
    }

    /* 좌측 토글 패널 */
    .left-panel {
      width: 200px;
      background: var(--win-bg);
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 15px;
    }

    /* ===== 마인크래프트 베드락 설정 토글 디자인 ===== */
    .mc-settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mc-icon {
      font-size: 24px;
      width: 30px;
      text-align: center;
    }

    .mc-toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .mc-toggle-wrapper input {
      display: none;
    }

    .mc-toggle {
      width: 44px;
      height: 24px;
      background-color: #4a4a4a;
      border: 2px solid #1e1e1e;
      position: relative;
      box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* 켜졌을 때 생기는 왼쪽 홈 ( | 막대 ) */
    .mc-toggle::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 7px;
      width: 3px;
      height: 12px;
      background-color: #2b2b2b;
      display: none;
    }

    /* 꺼졌을 때 생기는 오른쪽 홈 ( 빈 공간 ) - 생략 가능하지만 좀 더 현실감을 위해 추가 */

    /* 슬라이더 손잡이 */
    .mc-toggle-slider {
      position: absolute;
      top: -2px; 
      left: -2px;
      width: 20px;
      height: 24px;
      background-color: #d8d8d8;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #5b5b5b;
      border-bottom: 2px solid #5b5b5b;
      transition: left 0.15s ease-in-out;
      z-index: 2;
    }

    /* 켜짐 상태 액션 */
    input:checked + .mc-toggle .mc-toggle-slider {
      left: 22px; /* 오른쪽 끝으로 이동 */
    }
    
    input:checked + .mc-toggle::before {
      display: block; /* 홈 표시 */
    }

    /* 비활성화 상태 (선생님 접속 전) */
    .host-offline .mc-toggle-slider {
      background-color: #6b6b6b !important;
      border-top-color: #8b8b8b !important;
      border-left-color: #8b8b8b !important;
      border-bottom-color: #3b3b3b !important;
      border-right-color: #3b3b3b !important;
    }
    
    .host-offline .toggle-text {
      color: #888 !important;
    }

    /* 텍스트 라벨 */
    .toggle-text {
      font-size: 16px;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
    }

    /* 우측 상태 및 학생 리스트 창 */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0; /* flex 자식 축소 허용 */
    }

    /* 플레이어 목록: 2열 그리드 */
    #player-list {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      align-content: start;
      gap: 0;
    }

    .list-header {
      text-align: center;
      font-size: 16px;
      padding: 2px 0;
      background: #9bbbeb; /* 약간 푸른빛의 리스트 헤더 */
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-dark);
    }

    .black-screen {
      flex: 1;
      background-color: #000;
      color: #fff;
      padding: 10px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      overflow-y: auto;
      border-top: 2px solid var(--win-border-darker);
      border-left: 2px solid var(--win-border-darker);
      border-right: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-light);
    }

    /* 학생 정보 라인 (스크린샷 스타일 반영) */
    .player-line {
      margin-bottom: 4px;
    }

    .player-line.host {
      color: #ff5555; /* 방장 등 구분을 위한 빨간 폰트 */
    }

    .player-line.offline {
      color: #888;
    }

    /* 플레이어 카드 호버 하이라이트 */
    .player-card {
      cursor: default;
      padding: 1px 2px;
    }
    .player-card:hover {
      background-color: var(--win-title-bg); /* Windows 95 선택 색상 (#000080) */
      color: #fff;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar {
      width: 16px;
    }
    ::-webkit-scrollbar-track {
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAABZJREFUeNpi2rVrf2QEAygwAQgwAAgwADsRAwUq9d5ZAAAAAElFTkSuQmCC'); /* 체커보드 패턴 */
    }
    ::-webkit-scrollbar-thumb {
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-dark);
    }
    /* 우클릭 컨텍스트 메뉴 */
    .context-menu {
      display: none;
      position: fixed;
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-darker);
      border-bottom: 2px solid var(--win-border-darker);
      z-index: 9999;
      min-width: 160px;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    }
    .context-menu.visible { display: block; }
    .context-menu-item {
      padding: 4px 20px 4px 8px;
      font-size: 13px;
      cursor: default;
      white-space: nowrap;
    }
    .context-menu-item:hover {
      background: var(--win-title-bg);
      color: #fff;
    }
    .context-menu-sep {
      height: 1px;
      background: var(--win-border-dark);
      margin: 2px 0;
    }
    /* 자주 쓰는 명령어 섹션 */
    .quick-cmd-section {
      margin-top: 10px;
      border-top: 1px solid #555;
      padding-top: 8px;
    }
    .quick-cmd-label {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 5px;
    }
    .quick-cmd-btn {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 3px;
      width: 100%;
    }
    .quick-cmd-run {
      flex: 1;
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-darker);
      border-bottom: 2px solid var(--win-border-darker);
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      padding: 2px 4px;
      cursor: pointer;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #000;
    }
    .quick-cmd-run:active {
      border-top: 2px solid var(--win-border-darker);
      border-left: 2px solid var(--win-border-darker);
      border-right: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-light);
    }
    .quick-cmd-run:disabled {
      color: #888;
      cursor: default;
    }
    .quick-cmd-edit {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 1px 2px;
      line-height: 1;
      color: #aaa;
    }
    .quick-cmd-edit:hover { color: #fff; }

    /* 명령어 편집 모달 */
    .quick-cmd-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .quick-cmd-modal.visible { display: flex; }
    .quick-cmd-modal-box {
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-darker);
      border-bottom: 2px solid var(--win-border-darker);
      padding: 12px;
      min-width: 260px;
      font-family: 'Silkscreen', sans-serif;
      font-size: 12px;
    }
    .quick-cmd-modal-box input,
    .quick-cmd-modal-box textarea {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      margin-bottom: 8px;
      font-family: 'VT323', monospace;
      font-size: 15px;
      background: #fff;
      border: 2px inset #888;
      padding: 2px 4px;
    }
    .quick-cmd-modal-box textarea {
      resize: vertical;
      white-space: pre-wrap;
    }
    .quick-cmd-modal-btns {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }
    .quick-cmd-modal-btns button {
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-darker);
      border-bottom: 2px solid var(--win-border-darker);
      font-family: 'Silkscreen', sans-serif;
      font-size: 12px;
      padding: 2px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body class="host-offline">

  <!-- 전체 윈도우 프레임 -->
  <div class="window">
    <!-- 타이틀 바 -->
    <div class="title-bar">
      <span>Classroom Mode</span>
    </div>

    <!-- 윈도우 컨텐츠 -->
    <div class="window-content">
      
      <!-- 상단 접속 상태 (숨김 - 요소는 유지, JS에서 참조) -->
      <div style="display:none;">
        <div id="connection-status"></div>
        <div id="status-dot"></div>
      </div>

      <!-- 메인 2단 화면 -->
      <div class="main-body">
        
        <!-- 좌측 패널: 토글 컨트롤 -->
        <div class="left-panel inset-border" style="background-color: #3b3b3b;">
          
          <div style="font-size: 16px; color: #fff; text-shadow: 1px 1px 0 #000; margin-bottom: 5px;">
            클래스룸 설정
          </div>

          <!-- 베드락 설정 컨셉: 주의 집중 토글 -->
          <div class="mc-settings-row" title="아직 방장(선생님)이 인식되지 않았습니다.">
            <div class="mc-icon">⏸️</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-world-pause" class="mc-setting-input" onchange="toggleWorldPause()">
              <div class="mc-toggle">
                <div class="mc-toggle-slider"></div>
              </div>
              <span class="toggle-text" id="toggle-text-status">주의 집중</span>
            </label>
          </div>

          <!-- 설정 1. TNT 금지 -->
          <div class="mc-settings-row">
            <div class="mc-icon">🧨</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-tnt" class="mc-setting-input" onchange="toggleSetting('tnt')">
              <div class="mc-toggle"><div class="mc-toggle-slider"></div></div>
              <span class="toggle-text">TNT 금지</span>
            </label>
          </div>

          <!-- 설정 2. 몹 금지 -->
          <div class="mc-settings-row">
            <div class="mc-icon">🧟</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-mobs" class="mc-setting-input" onchange="toggleSetting('mobs')">
              <div class="mc-toggle"><div class="mc-toggle-slider"></div></div>
              <span class="toggle-text">몹 금지</span>
            </label>
          </div>

          <!-- 설정 3. PvP 금지 -->
          <div class="mc-settings-row">
            <div class="mc-icon">⚔️</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-pvp" class="mc-setting-input" onchange="toggleSetting('pvp')">
              <div class="mc-toggle"><div class="mc-toggle-slider"></div></div>
              <span class="toggle-text">PvP 금지</span>
            </label>
          </div>

          <!-- 설정 4. 낮과 날씨 -->
          <div class="mc-settings-row">
            <div class="mc-icon">☀️</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-weather" class="mc-setting-input" onchange="toggleSetting('weather')">
              <div class="mc-toggle"><div class="mc-toggle-slider"></div></div>
              <span class="toggle-text">항상 맑음</span>
            </label>
          </div>

          <!-- 설정 5. 월드 변경 불가 -->
          <div class="mc-settings-row">
            <div class="mc-icon">🚫</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-immutable" class="mc-setting-input" onchange="toggleSetting('immutable')">
              <div class="mc-toggle"><div class="mc-toggle-slider"></div></div>
              <span class="toggle-text">변경 불가</span>
            </label>
          </div>

          <!-- 설정 6. 비행 능력 -->
          <div class="mc-settings-row">
            <div class="mc-icon">🦅</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-flight" class="mc-setting-input" onchange="toggleSetting('flight')">
              <div class="mc-toggle"><div class="mc-toggle-slider"></div></div>
              <span class="toggle-text">비행 허용</span>
            </label>
          </div>

          <!-- 설정 7. 크리에이티브 -->
          <div class="mc-settings-row">
            <div class="mc-icon">✨</div>
            <label class="mc-toggle-wrapper">
              <input type="checkbox" id="toggle-creative" class="mc-setting-input" onchange="toggleSetting('creative')">
              <div class="mc-toggle"><div class="mc-toggle-slider"></div></div>
              <span class="toggle-text">모드 변경</span>
            </label>
          </div>

          <!-- 자주 쓰는 명령어 -->
          <div class="quick-cmd-section">
            <div class="quick-cmd-label">⚡ 자주 쓰는 명령어</div>
            <div class="quick-cmd-btn"><button class="quick-cmd-run" id="qbtn-1" onclick="runQuickCmd(1)">(비어 있음)</button><button class="quick-cmd-edit" onclick="editQuickCmd(1)">✏️</button></div>
            <div class="quick-cmd-btn"><button class="quick-cmd-run" id="qbtn-2" onclick="runQuickCmd(2)">(비어 있음)</button><button class="quick-cmd-edit" onclick="editQuickCmd(2)">✏️</button></div>
            <div class="quick-cmd-btn"><button class="quick-cmd-run" id="qbtn-3" onclick="runQuickCmd(3)">(비어 있음)</button><button class="quick-cmd-edit" onclick="editQuickCmd(3)">✏️</button></div>
            <div class="quick-cmd-btn"><button class="quick-cmd-run" id="qbtn-4" onclick="runQuickCmd(4)">(비어 있음)</button><button class="quick-cmd-edit" onclick="editQuickCmd(4)">✏️</button></div>
            <div class="quick-cmd-btn"><button class="quick-cmd-run" id="qbtn-5" onclick="runQuickCmd(5)">(비어 있음)</button><button class="quick-cmd-edit" onclick="editQuickCmd(5)">✏️</button></div>
          </div>

          <!-- 나머지 텅 빈 여백 -->
          <div style="flex: 1;"></div>
        </div>

        <!-- 명령어 편집 모달 -->
        <div class="quick-cmd-modal" id="quick-cmd-modal">
          <div class="quick-cmd-modal-box">
            <div style="margin-bottom:8px; font-size:13px;">명령어 편집</div>
            <div>버튼 이름</div>
            <input type="text" id="qcmd-name-input" placeholder="예) 전체 텔레포트">
            <div>명령어 (여러 줄 구분 가능, 예: /tp @a @s)</div>
            <textarea id="qcmd-cmd-input" placeholder="줄바꿈으로 여러 명령어를 입력하세요" rows="4"></textarea>
            <div class="quick-cmd-modal-btns">
              <button onclick="saveQuickCmd()">Save</button>
              <button onclick="closeQuickCmdModal()">Cancel</button>
            </div>
          </div>
        </div>

        <!-- 우측 패널: 학생 리스트 창 -->
        <div class="right-panel">
          <div class="list-header">
            학생 목록
          </div>
          
          <!-- 플레이어 목록 (2열, 업퍼 절반) -->
          <div class="black-screen" id="player-list" style="flex: 1; overflow-y: auto;">
            <div style="color: #888;">마인크래프트 연결 대기 중...</div>
          </div>
          
          <div class="list-header" style="margin-top: 5px;" id="chat-header">
            채팅
          </div>
          <div class="black-screen" style="flex: 1; overflow-y: auto;" id="chat-log">
            <div style="color: #888; font-size: 16px;">[System] Classroom Mode initialized.</div>
          </div>
          <!-- 채팅 입력 영역 -->
          <div style="display: flex; gap: 4px; margin-top: 4px;">
            <input
              type="text"
              id="chat-input"
              placeholder="메시지 또는 /커맨드 입력..."
              style="
                flex: 1;
                background: #000;
                color: #fff;
                border: 2px solid #555;
                font-family: 'VT323', monospace;
                font-size: 16px;
                padding: 2px 6px;
                outline: none;
              "
            >
            <button
