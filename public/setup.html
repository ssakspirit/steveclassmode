<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steve Classroom Mode - 연결 대기 중...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&display=swap" rel="stylesheet">
  <style>
    :root {
      --win-bg: #c0c0c0;
      --win-border-light: #ffffff;
      --win-border-dark: #808080;
      --win-border-darker: #404040;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Silkscreen', 'Gulim', sans-serif;
      background-color: #008080;
      color: #000;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .window {
      background-color: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-darker);
      border-bottom: 2px solid var(--win-border-darker);
      width: 825px;
      max-width: 95%;
      display: flex;
      flex-direction: column;
    }
    .title-bar {
      background: linear-gradient(90deg, #3d6b1e 0%, #5c9c2b 50%, #3d6b1e 100%);
      color: #fff;
      text-shadow: 1px 1px 0px #2a4a12;
      padding: 5px 9px;
      font-size: 21px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .window-content {
      padding: 38px;
      text-align: center;
    }
    h1 {
      font-size: 33px;
      margin-bottom: 23px;
      color: #000;
    }
    p {
      margin-bottom: 30px;
      font-size: 21px;
      color: #333;
    }
    .command-box {
      background: #000;
      padding: 23px;
      font-family: 'VT323', monospace;
      font-size: 33px;
      color: #fff;
      margin-bottom: 30px;
      border-top: 2px solid var(--win-border-darker);
      border-left: 2px solid var(--win-border-darker);
      border-right: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-light);
      word-break: break-all;
    }
    .btn-copy {
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-darker);
      border-bottom: 2px solid var(--win-border-darker);
      padding: 12px 45px;
      font-family: 'Silkscreen', 'Gulim', sans-serif;
      font-size: 21px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-copy:active {
      border-top: 2px solid var(--win-border-darker);
      border-left: 2px solid var(--win-border-darker);
      border-right: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-light);
    }
    .status {
      margin-top: 38px;
      font-size: 19px;
      color: #000;
      margin-bottom: 20px;
    }
    .btn-loopback {
      background: transparent;
      border: 2px solid var(--win-border-darker);
      color: #000;
      padding: 8px 15px;
      font-family: 'Gulim', sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin-top: 20px;
      text-decoration: underline;
    }
    .btn-loopback:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title-bar">SteveClassroom Connect</div>
    <div class="window-content">
      <h1>마인크래프트 연결 대기 중</h1>
      <p>아래의 명령어를 마인크래프트 게임 내 채팅창에 붙여넣으세요.</p>
      
      <div class="command-box" id="command-text">
        /connect 로딩 중...
      </div>
      
      <button class="btn-copy" id="btn-copy">명령어 복사 (Copy)</button>
      
      <div class="status">
        <span id="status-text">서버 정보를 가져오는 중입니다...</span>
      </div>
      
      <div>
        <button class="btn-loopback" id="btn-loopback">베드락 에디션 접속 차단 풀기 (최초 1회)</button>
      </div>
    </div>
  </div>

  <script src="setup.js"></script>
</body>
</html>
